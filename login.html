<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batidos-Natus | Acceso</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-container">
        <div class="main-header">
            <div class="logo-area">
                <h1>🥤 Batidos-Natus</h1>
                <p>Energía natural, sabor auténtico</p>
            </div>
        </div>
        <div class="content-pane">
            <div class="auth-panel">
                <div class="auth-card">
                    <div class="auth-tabs">
                        <button class="tab-btn active" id="tabLoginBtn">Iniciar Sesión</button>
                        <button class="tab-btn" id="tabRegisterBtn">Registrarse</button>
                    </div>
                    <div id="authFormContainer">
                        <!-- Formulario Login por defecto -->
                        <form id="loginForm" class="auth-form">
                            <div class="input-group">
                                <label>👤 Usuario</label>
                                <input type="text" id="loginUsername" placeholder="Ej: cliente1" required>
                            </div>
                            <div class="input-group">
                                <label>🔒 Contraseña</label>
                                <input type="password" id="loginPassword" placeholder="********" required>
                            </div>
                            <button type="submit" class="auth-submit">Ingresar</button>
                            <div id="authMessage" class="error-msg"></div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
