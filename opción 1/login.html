<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batidos-Natus | Acceso</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <div class="app-container">
        <div class="main-header">
            <div class="logo-area">
                <img src="img/logo2.png" alt="Batidos-Natus Logo" class="logo-img">
                <div class="logo-text">
                    <h1>Batidos-Natus</h1>
                    <p>Energía natural, sabor auténtico</p>
                </div>
            </div>
            <button id="adminLoginBtn" class="btn-admin-header">Administrador</button>
        </div>
        <div class="content-pane">
            <div class="auth-panel">
                <div class="auth-card">
                    <div class="auth-tabs">
                        <button class="tab-btn active" id="tabLoginBtn">Iniciar Sesión</button>
                        <button class="tab-btn" id="tabRegisterBtn">Registrarse</button>
                    </div>
                    <div id="authFormContainer">
                        <!-- Formulario Login por defecto -->
                        <form id="loginForm" class="auth-form">
                            <div class="input-group">
                                <label>👤 Usuario</label>
                                <input type="text" id="loginUsername" placeholder="Ej: cliente1" required>
                            </div>
                            <div class="input-group">
                                <label>🔒 Contraseña</label>
                                <input type="password" id="loginPassword" placeholder="********" required>
                            </div>
                            <button type="submit" class="auth-submit">Ingresar</button>
                            <div id="authMessage" class="error-msg"></div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL DE LOGIN ADMIN -->
    <div id="adminModal" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>🔑 Acceso Administrador</h2>
                <button id="closeModalBtn" class="modal-close">&times;</button>
            </div>
            <form id="adminLoginForm" class="auth-form">
                <div class="input-group">
                    <label>👤 Usuario Admin</label>
                    <input type="text" id="adminUsername" placeholder="admin" required>
                </div>
                <div class="input-group">
                    <label>🔒 Contraseña</label>
                    <input type="password" id="adminPassword" placeholder="********" required>
                </div>
                <button type="submit" class="auth-submit admin-submit">Ingresar como Admin</button>
                <div id="adminAuthMessage" class="error-msg"></div>
            </form>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>

    <!-- Agregamos un script específico para el login admin -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const adminBtn = document.getElementById('adminLoginBtn');
            const modal = document.getElementById('adminModal');
            const closeBtn = document.getElementById('closeModalBtn');
            const adminForm = document.getElementById('adminLoginForm');
            const adminMessage = document.getElementById('adminAuthMessage');

            // Abrir modal
            adminBtn.addEventListener('click', function() {
                modal.style.display = 'flex';
                document.getElementById('adminUsername').focus();
            });

            // Cerrar modal
            closeBtn.addEventListener('click', function() {
                modal.style.display = 'none';
                adminMessage.textContent = '';
                adminForm.reset();
            });

            // Cerrar modal al hacer clic fuera
            modal.addEventListener('click', function(e) {
                if (e.target === modal) {
                    modal.style.display = 'none';
                    adminMessage.textContent = '';
                    adminForm.reset();
                }
            });

            // Login de admin
            adminForm.addEventListener('submit', function(e) {
                e.preventDefault();
                const username = document.getElementById('adminUsername').value.trim();
                const password = document.getElementById('adminPassword').value.trim();

                if (!username || !password) {
                    adminMessage.textContent = '⚠️ Completa todos los campos';
                    adminMessage.style.color = '#e74c3c';
                    return;
                }

                // Intentar login
                const result = loginUser(username, password);
                
                if (result.success && result.role === 'admin') {
                    adminMessage.textContent = '✅ Acceso concedido. Redirigiendo...';
                    adminMessage.style.color = '#2ecc71';
                    setTimeout(() => {
                        window.location.href = 'admin.html';
                    }, 800);
                } else {
                    adminMessage.textContent = '❌ Acceso denegado. Solo administradores.';
                    adminMessage.style.color = '#e74c3c';
                    document.getElementById('adminPassword').value = '';
                    document.getElementById('adminPassword').focus();
                }
            });
        });
    </script>

</body>
</html>
